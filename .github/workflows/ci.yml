name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Quality (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        elixir: ["1.18"]
        otp: ["27"]
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore PLT cache
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plts-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix format --check-formatted

      - run: mix credo --strict

      - run: mix dialyzer

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.17"
            otp: "25"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "25"
          - elixir: "1.18"
            otp: "27"
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix compile --warnings-as-errors

      - run: mix test --warnings-as-errors

  tck:
    name: TCK Compliance
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: astral-sh/setup-uv@v7

      - name: Restore dependencies cache
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ runner.os }}-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.18-27-

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ runner.os }}-1.18-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.18-27-

      - name: Cache TCK repo
        uses: actions/cache@v5
        with:
          path: .tck
          key: tck-${{ hashFiles('bin/tck') }}

      - run: mix deps.get

      - run: mix compile

      - name: Run TCK (all categories)
        run: bin/tck all 2>&1 | tee tck-output.txt

      - name: Post TCK results to PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f tck-output.txt ]; then
            echo "No TCK output to post"
            exit 0
          fi

          SUMMARY=$(sed -n '/COMPREHENSIVE TEST RESULTS SUMMARY/,/^={10,}/p' tck-output.txt | head -30)

          if [ -z "$SUMMARY" ]; then
            echo "No summary section found in TCK output"
            exit 0
          fi

          MARKER="<!-- tck-compliance-results -->"
          PR_NUMBER=${{ github.event.pull_request.number }}

          {
            echo "${MARKER}"
            echo "## TCK Compliance Results"
            echo ""
            echo '```'
            echo "$SUMMARY"
            echo '```'
          } > tck-comment.md

          BODY=$(cat tck-comment.md)

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"${MARKER}\")) | .id] | first" 2>/dev/null || true)

          if [ -n "$COMMENT_ID" ] && [ "$COMMENT_ID" != "null" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body-file tck-comment.md
          fi

  publish:
    name: Publish to Hex
    if: github.event_name == 'release'
    needs: [quality, test, tck]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - run: mix deps.get

      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          mix_version=$(grep '@version "' mix.exs | sed 's/.*@version "//;s/"//')
          if [ "$tag" != "$mix_version" ]; then
            echo "::error::Tag v$tag does not match mix.exs version $mix_version"
            exit 1
          fi

      - run: mix hex.publish --yes
    env:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
